<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patiyolu — Şifre sıfırlama</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f3f1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#111111;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f3f1;padding:48px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#fdfcfc;border:1px solid #e5e5e5;border-radius:24px;overflow:hidden;">
            <tr>
              <td style="background:linear-gradient(135deg,#fde6cf 0%,#f9d5e0 100%);padding:48px 32px 32px 32px;text-align:center;">
                <div style="font-size:64px;line-height:1;margin-bottom:8px;">🔐</div>
                <h1 style="margin:12px 0 0 0;font-family:Georgia,serif;font-size:28px;line-height:1.15;color:#111111;font-weight:400;">
                  Şifreni sıfırla
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;">
                  Şifre sıfırlama talebi aldık. Aşağıdaki butona tıkla, yeni şifreni belirle.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px auto;">
                  <tr>
                    <td style="border-radius:9999px;background:#111111;">
                      <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:500;color:#fdfcfc;text-decoration:none;border-radius:9999px;">
                        Şifremi sıfırla →
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:24px 0 0 0;font-size:12px;color:#777169;text-align:center;">
                  Bu talebi sen yapmadıysan bu maili görmezden gelebilirsin.
                </p>
              </td>
            </tr>
            <tr>
              <td style="background:#f5f3f1;padding:20px;text-align:center;border-top:1px solid #e5e5e5;font-size:11px;color:#777169;">
                Patiyolu — Evcil dostlar için güvenli nakliyat
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
